<div
  class="skill-card group bg-white border border-gray-100 rounded-xl p-5 cursor-pointer hover:shadow-lg hover:border-indigo-200 hover:-translate-y-0.5 transition-all duration-200"
  hx-get="/ui/skills/{{ pkg.name }}" hx-target="#modal-content">
  <!-- Header row -->
  <div class="flex items-start justify-between mb-3">
    <div class="flex items-center gap-2.5 min-w-0">
      <div
        class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-100 to-violet-100 border border-indigo-100 flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
        </svg>
      </div>
      <h3 class="font-semibold text-gray-900 text-sm truncate group-hover:text-indigo-700 transition-colors">{{ pkg.name
        }}</h3>
    </div>
    {% if pkg.latest_version %}
    <span
      class="ml-2 px-2 py-0.5 text-xs font-medium bg-indigo-50 text-indigo-600 rounded-md flex-shrink-0 border border-indigo-100">
      v{{ pkg.latest_version }}
    </span>
    {% endif %}
  </div>

  {% if pkg.author %}
  <p class="text-xs text-gray-400 mb-2 flex items-center gap-1">
    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
    </svg>
    {{ pkg.author }}
  </p>
  {% endif %}

  {% if pkg.description %}
  <p class="text-xs text-gray-500 line-clamp-2 mb-4 leading-relaxed">{{ pkg.description }}</p>
  {% endif %}

  <div class="flex flex-wrap gap-1.5">
    {% for tag in pkg.tags %}
    <span class="px-2 py-0.5 text-xs bg-slate-100 text-slate-500 rounded-md font-medium">{{ tag }}</span>
    {% endfor %}
  </div>
</div>
