<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
          colors: {
            brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-slate-50 text-gray-900 min-h-screen font-sans antialiased">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 px-6 py-0 h-16 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-3">
        <div
          class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-sm">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
          </svg>
        </div>
        <span class="text-lg font-semibold text-gray-900 tracking-tight">SkillHub</span>
      </div>
      <nav class="flex items-center gap-1">
        <a href="/"
          class="px-3 py-1.5 rounded-lg text-sm font-medium text-indigo-700 bg-indigo-50 transition-colors">Skills</a>
        <a href="/admin"
          class="px-3 py-1.5 rounded-lg text-sm text-gray-500 hover:text-gray-900 hover:bg-slate-100 transition-colors">Admin</a>
      </nav>
    </div>
  </header>

  <div class="flex flex-col h-[calc(100vh-64px)]">

    <!-- Sticky toolbar -->
    <div class="sticky top-0 bg-slate-50/95 backdrop-blur border-b border-gray-200 px-6 py-4 z-10">
      <!-- Search -->
      <div class="relative mb-4">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none"
          stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
        </svg>
        <input type="text" name="search" id="search-input" placeholder="Search skills..."
          class="w-full bg-white border border-gray-200 rounded-xl pl-10 pr-4 py-2.5 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition placeholder-gray-400"
          hx-get="/ui/skills" hx-trigger="input delay:300ms" hx-include="[name='search'],[name='tag']"
          hx-target="#skill-grid" />
      </div>
      <!-- Tag filters -->
      <div class="flex flex-wrap items-center gap-1.5">
        <span class="text-xs font-medium text-gray-400 mr-1">Filter:</span>
        <div id="tag-inputs"></div>
        {% for tag in all_tags %}
        <button
          class="tag-pill px-3 py-1 rounded-full text-xs font-medium border transition-all duration-150 bg-white text-gray-500 border-gray-200 hover:border-indigo-400 hover:text-indigo-600"
          data-tag="{{ tag }}" type="button" onclick="selectTag('{{ tag }}')">{{ tag }}</button>
        {% endfor %}
        <button id="clear-tags"
          class="hidden px-3 py-1 rounded-full text-xs font-medium border border-red-200 text-red-500 hover:bg-red-50 transition-all duration-150"
          type="button" onclick="clearTags()">
          <span class="flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
            Clear filters
          </span>
        </button>
      </div>
    </div>

    <!-- Skill grid -->
    <div class="flex-1 overflow-y-auto px-6 py-6">
      <div id="skill-grid">
        {% include "partials/skill_grid.html" %}
      </div>
    </div>

  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay"
    class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-20 hidden items-center justify-center p-6"
    onclick="closeModal()">
    <div id="modal-dialog" class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] overflow-y-auto"
      onclick="event.stopPropagation()">
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    const selectedTags = new Set();

    function openModal() {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.remove('hidden');
      overlay.classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.add('hidden');
      overlay.classList.remove('flex');
      document.body.style.overflow = '';
    }

    document.addEventListener('htmx:afterSwap', (e) => {
      if (e.detail.target.id === 'modal-content') {
        if (e.detail.target.innerHTML.trim() === '') {
          closeModal();
        } else {
          openModal();
        }
      }
    });

    function _syncTagInputs() {
      const container = document.getElementById('tag-inputs');
      container.innerHTML = '';
      selectedTags.forEach(t => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'tag';
        input.value = t;
        container.appendChild(input);
      });
    }

    function _refreshGrid() {
      const search = document.getElementById('search-input').value;
      htmx.ajax('GET', '/ui/skills', {
        target: '#skill-grid',
        swap: 'innerHTML',
        values: { search, tag: [...selectedTags] },
      });
    }

    function selectTag(tag) {
      if (selectedTags.has(tag)) {
        selectedTags.delete(tag);
      } else {
        selectedTags.add(tag);
      }
      document.querySelectorAll('.tag-pill').forEach(pill => {
        const isActive = selectedTags.has(pill.dataset.tag);
        pill.classList.toggle('bg-indigo-600', isActive);
        pill.classList.toggle('text-white', isActive);
        pill.classList.toggle('border-indigo-600', isActive);
        pill.classList.toggle('shadow-sm', isActive);
        pill.classList.toggle('bg-white', !isActive);
        pill.classList.toggle('text-gray-500', !isActive);
        pill.classList.toggle('border-gray-200', !isActive);
      });
      document.getElementById('clear-tags').classList.toggle('hidden', selectedTags.size === 0);
      _syncTagInputs();
      _refreshGrid();
    }

    function clearTags() {
      selectedTags.clear();
      document.querySelectorAll('.tag-pill').forEach(pill => {
        pill.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600', 'shadow-sm');
        pill.classList.add('bg-white', 'text-gray-500', 'border-gray-200');
      });
      document.getElementById('clear-tags').classList.add('hidden');
      document.getElementById('tag-inputs').innerHTML = '';
      _refreshGrid();
    }
  </script>

</body>

</html>
