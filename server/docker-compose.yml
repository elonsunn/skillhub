services:
  skillhub:
    build: .
    container_name: skillhub-server
    restart: unless-stopped
    ports:
      - "${PORT}:8000"
    volumes:
      - ./data:/app/data
      - ./data/storage:/app/storage
    environment:
      - DATABASE_URL=sqlite:////app/data/skillhub.db
      - STORAGE_ROOT=/app/storage
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
